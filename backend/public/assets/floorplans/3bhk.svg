<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360">
  <rect x="0" y="0" width="480" height="360" fill="#1a1c1f" />

  <!-- outer boundary -->
  <rect x="20" y="20" width="440" height="320" fill="none" stroke="#63d5f0" stroke-width="3" />

  <!-- Living / Dining (large, left) -->
  <rect x="20" y="20" width="230" height="180" fill="none" stroke="#bcc9cc" stroke-width="1.5" />
  <text x="135" y="115" text-anchor="middle" fill="#bcc9cc" font-family="Inter, sans-serif" font-size="14" font-weight="600">LIVING / DINING</text>

  <!-- Kitchen -->
  <rect x="250" y="20" width="110" height="90" fill="none" stroke="#bcc9cc" stroke-width="1.5" />
  <text x="305" y="70" text-anchor="middle" fill="#bcc9cc" font-family="Inter, sans-serif" font-size="12" font-weight="600">KITCHEN</text>

  <!-- Home office -->
  <rect x="360" y="20" width="100" height="90" fill="none" stroke="#bcc9cc" stroke-width="1.5" />
  <text x="410" y="70" text-anchor="middle" fill="#bcc9cc" font-family="Inter, sans-serif" font-size="11" font-weight="600">OFFICE</text>

  <!-- Bathroom (common) -->
  <rect x="250" y="110" width="110" height="90" fill="none" stroke="#bcc9cc" stroke-width="1.5" />
  <text x="305" y="160" text-anchor="middle" fill="#bcc9cc" font-family="Inter, sans-serif" font-size="12" font-weight="600">BATH</text>

  <!-- Master bedroom (ensuite) -->
  <rect x="360" y="110" width="100" height="90" fill="none" stroke="#bcc9cc" stroke-width="1.5" />
  <text x="410" y="150" text-anchor="middle" fill="#bcc9cc" font-family="Inter, sans-serif" font-size="10" font-weight="600">MASTER</text>
  <text x="410" y="168" text-anchor="middle" fill="#bcc9cc" font-family="Inter, sans-serif" font-size="10" font-weight="600">ENSUITE</text>

  <!-- Bedroom 2 -->
  <rect x="20" y="200" width="220" height="140" fill="none" stroke="#bcc9cc" stroke-width="1.5" />
  <text x="130" y="275" text-anchor="middle" fill="#bcc9cc" font-family="Inter, sans-serif" font-size="14" font-weight="600">BEDROOM 2</text>

  <!-- Master bedroom (lower) -->
  <rect x="240" y="200" width="220" height="140" fill="none" stroke="#bcc9cc" stroke-width="1.5" />
  <text x="350" y="275" text-anchor="middle" fill="#bcc9cc" font-family="Inter, sans-serif" font-size="14" font-weight="600">BEDROOM 1</text>

  <!-- door swings (decorative arcs) -->
  <path d="M 250 60 A 20 20 0 0 1 270 80" fill="none" stroke="#63d5f0" stroke-width="1" opacity="0.6" />
  <path d="M 240 220 A 20 20 0 0 1 260 240" fill="none" stroke="#63d5f0" stroke-width="1" opacity="0.6" />
  <path d="M 360 130 A 20 20 0 0 1 380 150" fill="none" stroke="#63d5f0" stroke-width="1" opacity="0.6" />
</svg>
