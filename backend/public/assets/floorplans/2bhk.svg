<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" width="480" height="360">
  <rect x="0" y="0" width="480" height="360" fill="#1a1c1f" />

  <!-- outer boundary -->
  <rect x="20" y="20" width="440" height="320" fill="none" stroke="#63d5f0" stroke-width="3" />

  <!-- Living / Dining (large, left) -->
  <rect x="20" y="20" width="260" height="220" fill="none" stroke="#bcc9cc" stroke-width="1.5" />
  <text x="150" y="135" text-anchor="middle" fill="#bcc9cc" font-family="Inter, sans-serif" font-size="14" font-weight="600">LIVING / DINING</text>

  <!-- Kitchen (top right) -->
  <rect x="280" y="20" width="180" height="110" fill="none" stroke="#bcc9cc" stroke-width="1.5" />
  <text x="370" y="80" text-anchor="middle" fill="#bcc9cc" font-family="Inter, sans-serif" font-size="14" font-weight="600">KITCHEN</text>

  <!-- Bathroom (mid right) -->
  <rect x="280" y="130" width="90" height="110" fill="none" stroke="#bcc9cc" stroke-width="1.5" />
  <text x="325" y="188" text-anchor="middle" fill="#bcc9cc" font-family="Inter, sans-serif" font-size="12" font-weight="600">BATH</text>

  <!-- Closet (mid right) -->
  <rect x="370" y="130" width="90" height="110" fill="none" stroke="#bcc9cc" stroke-width="1.5" />
  <text x="415" y="188" text-anchor="middle" fill="#bcc9cc" font-family="Inter, sans-serif" font-size="12" font-weight="600">STORE</text>

  <!-- Bedroom (bottom) -->
  <rect x="20" y="240" width="440" height="100" fill="none" stroke="#bcc9cc" stroke-width="1.5" />
  <text x="240" y="295" text-anchor="middle" fill="#bcc9cc" font-family="Inter, sans-serif" font-size="14" font-weight="600">BEDROOM</text>

  <!-- Balcony strip -->
  <rect x="20" y="20" width="440" height="0" fill="none" />
  <rect x="20" y="0" width="0" height="0" />

  <!-- door swings (decorative arcs) -->
  <path d="M 280 130 A 20 20 0 0 1 300 150" fill="none" stroke="#63d5f0" stroke-width="1" opacity="0.6" />
  <path d="M 240 240 A 20 20 0 0 1 260 260" fill="none" stroke="#63d5f0" stroke-width="1" opacity="0.6" />
</svg>
